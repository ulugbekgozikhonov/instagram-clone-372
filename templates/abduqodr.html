<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Saytim</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
        }

        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 10%;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            transition:0.3s;
        }

        nav a:hover{
            color:#ffd700;
        }

        .hero{
            height:90vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .hero h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:20px;
            margin-bottom:30px;
        }

        .btn{
            background:white;
            color:#764ba2;
            padding:15px 35px;
            border-radius:30px;
            text-decoration:none;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.1);
        }

        .cards{
            display:flex;
            justify-content:center;
            gap:30px;
            padding:50px;
            flex-wrap:wrap;
        }

        .card{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            width:300px;
            padding:25px;
            border-radius:20px;
            text-align:center;
        }

        .card h3{
            margin-bottom:15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MARS IT</div>

        <nav>
            <a href="#">Bosh sahifa</a>
            <a href="#">Biz haqimizda</a>
            <a href="#">Xizmatlar</a>
            <a href="#">Aloqa</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Kelajakni Bugundan Boshlang</h1>
        <p>Dasturlash va IT olamiga xush kelibsiz!</p>
        <a href="#" class="btn">Boshlash</a>
    </section>

    <section class="cards">
        <div class="card">
            <h3>Frontend</h3>
            <p>HTML, CSS, JavaScript va React.</p>
        </div>

        <div class="card">
            <h3>Backend</h3>
            <p>Django, API va ma'lumotlar bazasi.</p>
        </div>

        <div class="card">
            <h3>AI</h3>
            <p>Sun'iy intellekt va zamonaviy texnologiyalar.</p>
        </div>
    </section>

</body>
</html>
